<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
    <title>TypeScript テスト（ビルドあり）</title>
    <style>
        :root {
            --bg: #fff8f0;
            --ink: #1d2a32;
            --card: rgba(255, 255, 255, 0.82);
            --line: rgba(35, 50, 61, 0.16);
            --accent: #ff7b2c;
            --accent-2: #2bb4a0;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            padding: 22px;
            font-family: "Manrope", "Noto Sans JP", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 6%, rgba(255, 123, 44, 0.35), transparent 42%),
                radial-gradient(circle at 87% 10%, rgba(43, 180, 160, 0.34), transparent 38%),
                linear-gradient(145deg, #fffdf9, var(--bg));
        }
        .shell {
            max-width: 920px;
            margin: 0 auto;
        }
        .panel {
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 26px;
            background: var(--card);
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 44px rgba(31, 44, 52, 0.14);
            animation: rise .52s ease both;
        }
        .eyebrow {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 800;
            border: 1px solid rgba(29, 42, 50, 0.13);
            background: linear-gradient(90deg, rgba(255, 123, 44, 0.16), rgba(43, 180, 160, 0.14));
            margin-bottom: 10px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.6rem, 3vw, 2.5rem);
            letter-spacing: -0.02em;
        }
        .lead {
            margin: 0;
            color: rgba(29, 42, 50, 0.72);
        }
        #status {
            margin-top: 18px;
            margin-bottom: 12px;
            font-weight: 700;
            color: #0f6f5f;
        }
        .metrics {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            margin: 16px 0;
        }
        .metric {
            border: 1px solid var(--line);
            background: #fff;
            border-radius: 14px;
            padding: 12px;
        }
        .metric-label {
            margin: 0;
            font-size: 0.8rem;
            opacity: 0.72;
        }
        .metric-value {
            margin: 4px 0 0;
            font-size: 1.2rem;
            font-weight: 800;
        }
        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 8px;
        }
        .task-item {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.88);
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
        }
        .tag {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 999px;
            font-weight: 700;
            background: rgba(43, 180, 160, 0.12);
            border: 1px solid rgba(43, 180, 160, 0.35);
            white-space: nowrap;
        }
        .back {
            display: inline-block;
            margin-top: 18px;
            color: #146a5c;
            text-decoration: none;
            font-weight: 700;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="panel">
            <span class="eyebrow">TypeScript Demo</span>
            <h1>Type-safe な表現を含む UI テスト</h1>
            <p class="lead">このページは <code>typescript-test.ts</code> を GitHub Actions でコンパイルした <code>typescript-test.js</code> を表示します。</p>

            <p id="status">ビルド済み TypeScript を読み込み中...</p>
            <div id="ts-output"></div>

            <a class="back" href="index.html">トップへ戻る</a>
        </section>
    </main>
    <script src="./typescript-test.js" defer></script>
</body>
</html>
