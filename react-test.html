<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React テスト（ビルドなし）</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            max-width: 760px;
            margin: 0 auto;
            padding: 24px;
            line-height: 1.6;
        }
        .panel {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            background: #fafafa;
        }
        code {
            background: #f2f2f2;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>React テスト（ビルドなし）</h1>
    <p>このページは、JSX をブラウザがそのまま解釈できないことを確認するためのテストです。</p>

    <div class="panel">
        <p id="status">読み込み中...</p>
        <div id="root"></div>
        <p>期待結果: エラーになり、下記メッセージが表示されます。</p>
    </div>

    <p><a href="index.html">トップへ戻る</a></p>

    <script type="module">
        const status = document.getElementById("status");
        import("./react-test.jsx")
            .then(() => {
                status.textContent = "予期せず成功しました（環境がJSX変換に対応している可能性があります）。";
            })
            .catch((err) => {
                status.textContent = "想定どおり失敗: React(JSX) はビルドなしで実行できません。";
                console.error("React JSX load error:", err);
            });
    </script>
</body>
</html>
