<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages ビルドありテスト</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        h1 {
            margin-top: 0;
            color: #3655c7;
        }
        .note {
            background: #f0f4ff;
            border-left: 4px solid #3655c7;
            padding: 12px;
            border-radius: 6px;
        }
        ul {
            line-height: 1.9;
        }
        a {
            color: #2f4ebf;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <p>ビルド済みファイルを読み込み中...</p>
    </div>

    <noscript>このページは JavaScript 有効化が必要です。</noscript>
    <script>
        (function () {
            var app = document.getElementById("app");
            var baseUrl = window.location.href.endsWith("/")
                ? window.location.href
                : window.location.href + "/";
            var script = document.createElement("script");
            script.src = new URL("index.js", baseUrl).toString();
            script.defer = true;
            script.onerror = function () {
                if (app) {
                    app.innerHTML = "<p>index.js の読み込みに失敗しました。GitHub Pages の公開設定と Actions のデプロイ結果を確認してください。</p>";
                }
            };
            document.body.appendChild(script);
        })();
    </script>
</body>
</html>
